<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyborg - University Gaming Club</title>
    <link rel="stylesheet" href="css/home_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo-section">
                <div class="logo-placeholder">
                    <span class="logo-icon">⚡</span>
                </div>
                <div class="logo-text">
                    <h1>CYBORG</h1>
                    <p>University Gaming Club</p>
                </div>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#home" class="active">Home</a></li>
                    <li><a href="#games">Games</a></li>
                    <li><a href="#ranking">Ranking</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#contact">Contact Us</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn-login">Login</button>
                <button class="btn-join">Join Club</button>
            </div>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

      <!-- Hero Section -->
     <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="container">
            <div class="hero-content">
                <div class="hero-badge">
                    <span class="pulse"></span>
                    Live Now - Weekly Tournament
                </div>
                <h1>Level Up Your <span class="highlight">Gaming</span></h1>
                <p class="hero-subtitle">Join the ultimate university gaming community. Compete, connect, and conquer with fellow gamers.</p>
                <div class="hero-buttons">
                    <button class="btn-primary">Join Now</button>
                    <button class="btn-secondary">Learn More</button>
                </div>
                <div class="hero-stats">
                    <div class="stat">
                        <span class="stat-number">500+</span>
                        <span class="stat-label">Members</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">50+</span>
                        <span class="stat-label">Tournaments</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">20+</span>
                        <span class="stat-label">Games</span>
                    </div>
                </div>
            </div>
            <div class="hero-visual">
                <div class="gaming-console">
                    <div class="screen-glow"></div>
                    <div class="console-content">
                        <div class="game-preview">
                            <div class="player-icon">🎮</div>
                            <div class="vs-text">VS</div>
                            <div class="player-icon">🕹️</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    </body>
</html>
